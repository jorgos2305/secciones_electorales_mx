services:

  postgres:
    image: postgis/postgis:17-master
    container_name: mexico-electoral-db
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: jorgos2305
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart:
      unless-stopped

volumes:
  postgres_data: